<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Queue System</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #eee;
    transition: 0.3s;
}

/* FONT SIZE */
body.small { font-size: 12px; }
body.medium { font-size: 16px; }
body.large { font-size: 20px; }

/* NAVBAR */
.navbar {
    background: #2f7f8a;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    width: 40px;
    height: 40px;
    background: black;
    border-radius: 50%;
}

.menu {
    display: flex;
    gap: 40px;
}

.menu a {
    color: white;
    text-decoration: none;
}

.menu a:hover {
    color: #ffd700;
    border-bottom: 2px solid #ffd700;
}

.right span {
    color: white;
    margin: 0 5px;
    cursor: pointer;
}

.right span:hover {
    color: #ffd700;
}

/* CONTENT */
.content {
    padding: 30px;
}

/* FLEX */
.flex {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
}

/* BOX */
.box {
    background: #3e8c9c;
    color: white;
    padding: 25px;
    border-radius: 10px;
    flex: 1;
    min-width: 250px;
    max-width: 320px;
    text-align: center;
}

/* TEXT SIZE (USE em so ikut font) */
.box h3 {
    font-size: 1.4em;
}

.big-number {
    font-size: 3em;
    font-weight: bold;
}

.your-number {
    font-size: 2.5em;
    font-weight: bold;
}

.info {
    margin: 5px 0;
}
</style>
</head>

<body class="medium">

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo"></div>

    <div class="menu">
        <a href="homepage.html#about-us" id="navAbout">About Us</a>
        <a href="location.html" id="navLocation">Location</a>
        <a href="app.html" id="navApp">Appointment</a>
        <a href="queue.html" id="navQueue">Queue</a>
        <a href="askDoctor.html" id="navAsk">Ask Us</a>
    </div>

    <div class="right">
        <span onclick="setFont('small')">A-</span>
        <span onclick="setFont('medium')">A</span>
        <span onclick="setFont('large')">A+</span>
        |
        <span onclick="setLang('en')">EN</span>
        <span onclick="setLang('bm')">BM</span>
    </div>
</div>

<div class="content">

<h2 id="title">APPOINTMENT QUEUE</h2>

<div class="flex">

    <!-- YOUR APPOINTMENT -->
    <div class="box">

        <h3 id="yourTitle">Your Appointment</h3>

        <div id="yourNum" class="your-number"></div>

        <div class="info"><span id="roomLabel">Room</span>: <span id="room"></span></div>
        <div class="info"><span id="doctorLabel">Doctor</span>: Dr Ali</div>
        <div class="info"><span id="typeLabel">Type</span>: <span id="type"></span></div>

        <div class="info"><b id="estimateText">Estimate</b>: <span id="yourEstimate"></span></div>
    </div>

    <!-- CURRENT -->
    <div class="box">
        <h3 id="currentTitle">Current Number</h3>
        <div id="current" class="big-number"></div>
    </div>

    <!-- LATEST -->
    <div class="box">
        <h3 id="latestTitle">Latest Queue</h3>
        <div id="latest" class="big-number"></div>
    </div>

</div>

<br>

<h3 style="text-align:center;" id="hospitalEstimate">
Hospital Queue Estimate: <span id="time"></span>
</h3>

</div>

<script>

// ================= DATA =================
let yourNumber = 18;
let current = 12;
let latest = 25;
let appointmentType = "Online"; // Online / Offline

// SAVE TIME (IMPORTANT FIX)
let hospitalTime = 0;
let userTime = 0;

// ================= FONT =================
function setFont(size) {
    document.body.className = size;
}

// ================= LANGUAGE =================
const text = {
    en: {
        title: "APPOINTMENT QUEUE",
        your: "Your Appointment",
        current: "Current Number",
        latest: "Latest Queue",
        estimate: "Estimate",
        hospital: "Hospital Queue Estimate",
        room: "Room",
        doctor: "Doctor",
        type: "Type",
        online: "Online",
        offline: "Offline",
        navAbout: "About Us",
        navLocation: "Location",
        navApp: "Appointment",
        navQueue: "Queue",
        navAsk: "Ask Us"
    },
    bm: {
        title: "GILIRAN TEMU JANJI",
        your: "Temu Janji Anda",
        current: "Nombor Semasa",
        latest: "Giliran Terkini",
        estimate: "Anggaran",
        hospital: "Anggaran Masa Hospital",
        room: "Bilik",
        doctor: "Doktor",
        type: "Jenis",
        online: "Dalam Talian",
        offline: "Bersemuka",
        navAbout: "Tentang Kami",
        navLocation: "Lokasi",
        navApp: "Temu Janji",
        navQueue: "Giliran",
        navAsk: "Tanya Kami"
    }
};

let currentLang = "en";

// ================= SET LANGUAGE =================
function setLang(lang) {
    currentLang = lang;

    document.getElementById("title").innerHTML = text[lang].title;
    document.getElementById("yourTitle").innerHTML = text[lang].your;
    document.getElementById("currentTitle").innerHTML = text[lang].current;
    document.getElementById("latestTitle").innerHTML = text[lang].latest;

    document.getElementById("estimateText").innerHTML = text[lang].estimate;
    document.getElementById("hospitalEstimate").innerHTML =
        text[lang].hospital + ": <span id='time'></span>";

    document.getElementById("roomLabel").innerHTML = text[lang].room;
    document.getElementById("doctorLabel").innerHTML = text[lang].doctor;
    document.getElementById("typeLabel").innerHTML = text[lang].type;

    document.getElementById("navAbout").innerHTML = text[lang].navAbout;
    document.getElementById("navLocation").innerHTML = text[lang].navLocation;
    document.getElementById("navApp").innerHTML = text[lang].navApp;
    document.getElementById("navQueue").innerHTML = text[lang].navQueue;
    document.getElementById("navAsk").innerHTML = text[lang].navAsk;

    updateDisplay();
    updateTimeDisplay(); // IMPORTANT FIX
}

// ================= RANDOM TIME =================
function getRandomTime() {
    return Math.floor(Math.random() * 11) + 10;
}

// ================= CALCULATE =================
function calculateEstimate() {

    let hospitalWaiting = latest - current;
    hospitalTime = 0;

    for(let i = 0; i < hospitalWaiting; i++) {
        hospitalTime += getRandomTime();
    }

    let userWaiting = yourNumber - current;
    userTime = 0;

    for(let i = 0; i < userWaiting; i++) {
        userTime += getRandomTime();
    }

    if(appointmentType === "Online") {
        userTime -= 5;
    }

    updateTimeDisplay();
}

// ================= DISPLAY TIME =================
function updateTimeDisplay() {
    document.getElementById("time").innerHTML = hospitalTime + " min";
    document.getElementById("yourEstimate").innerHTML = userTime + " min";
}

// ================= DISPLAY =================
function updateDisplay() {

    document.getElementById("yourNum").innerHTML = yourNumber;
    document.getElementById("current").innerHTML = current;
    document.getElementById("latest").innerHTML = latest;

    // ROOM
    if(appointmentType === "Online") {
        document.getElementById("room").innerHTML = "-";
    } else {
        document.getElementById("room").innerHTML = "101";
    }

    // TYPE TRANSLATE
    if(currentLang === "bm") {
        document.getElementById("type").innerHTML =
            appointmentType === "Online" ? text.bm.online : text.bm.offline;
    } else {
        document.getElementById("type").innerHTML = appointmentType;
    }
}

// ================= AUTO =================
function autoUpdate() {
    if(current < latest) current++;

    updateDisplay();
    calculateEstimate();
}

// INIT
updateDisplay();
calculateEstimate();
setInterval(autoUpdate, 5000);

</script>

</body>
</html>

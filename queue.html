<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Queue System</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #eee;
    transition: 0.3s;
}

/* FONT */
body.small { font-size: 12px; }
body.medium { font-size: 16px; }
body.large { font-size: 20px; }

/* NAVBAR */
.navbar {
    background: #2f7f8a;
    padding: 15px 30px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.logo {
    width: 40px;
    height: 40px;
    background: black;
    border-radius: 50%;
}

/* MENU */
.menu {
    display: flex;
    gap: 40px;
}

.menu a {
    color: white;
    text-decoration: none;
    transition: 0.2s;
}

.menu a:hover {
    color: #ffd700;
    border-bottom: 2px solid #ffd700;
}

/* RIGHT */
.right span {
    margin: 0 5px;
    cursor: pointer;
    color: white;
}

.right span:hover {
    color: #ffd700;
}

/* CONTENT */
.content {
    padding: 30px;
}

/* FLEX BOX */
.flex {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
}

/* BOX */
.box {
    background: #3e8c9c;
    color: white;
    padding: 25px;
    border-radius: 10px;
    flex: 1;
    min-width: 250px;
    max-width: 320px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    text-align: center;
}

/* TITLES (BIG & CENTER) */
.box h3 {
    font-size: 22px;
    margin-bottom: 10px;
}

/* BIG NUMBERS */
.big-number {
    font-size: 45px;
    font-weight: bold;
    margin: 10px 0;
}

/* YOUR QUEUE STYLE */
.your-number {
    font-size: 38px;
    font-weight: bold;
    margin: 10px 0;
}

/* INFO TEXT */
.info {
    margin: 5px 0;
}

</style>
</head>

<body class="medium">

<!-- NAVBAR -->
<div class="navbar">

    <div class="logo"></div>

    <div class="menu">
        <a href="homepage.html">About Us</a>
        <a href="location.html">Location</a>
        <a href="app.html">Appointment</a>
        <a href="queue.html">Queue</a>
        <a href="askDoctor.html">Ask Us</a>
    </div>

    <div class="right">
        <span onclick="setFont('small')">A-</span>
        <span onclick="setFont('medium')">A</span>
        <span onclick="setFont('large')">A+</span>
    </div>

</div>

<div class="content">

<h2>APPOINTMENT QUEUE</h2>

<div class="flex">

    <!-- YOUR APPOINTMENT -->
    <div class="box">

        <h3>Your Appointment</h3>

        <!-- QUEUE NUMBER (TOP BIG) -->
        <div class="your-number" id="yourNum"></div>

        <div class="info">Room: <span id="room"></span></div>
        <div class="info">Doctor: Dr Ali</div>
        <div class="info">Type: <span id="type"></span></div>

        <div class="info"><b>Estimate:</b> <span id="yourEstimate"></span></div>
    </div>

    <!-- CURRENT -->
    <div class="box">
        <h3>Current Number</h3>
        <div class="big-number" id="current"></div>
    </div>

    <!-- LATEST -->
    <div class="box">
        <h3>Latest Queue</h3>
        <div class="big-number" id="latest"></div>
    </div>

</div>

<br>

<h3 style="text-align:center;">
Hospital Queue Estimate: <span id="time"></span>
</h3>

</div>

<script>

// ================= DATA =================
let yourNumber = 18;
let current = 12;
let latest = 20;

let appointmentType = "Online"; // Online / Offline

// ================= FONT =================
function setFont(size) {
    document.body.className = size;
}

// ================= RANDOM TIME =================
function getRandomTime() {
    return Math.floor(Math.random() * 11) + 10;
}

// ================= CALC =================
function calculateEstimate() {

    let hospitalWaiting = latest - current;
    let hospitalTime = 0;

    for(let i = 0; i < hospitalWaiting; i++) {
        hospitalTime += getRandomTime();
    }

    let userWaiting = yourNumber - current;
    let userTime = 0;

    for(let i = 0; i < userWaiting; i++) {
        userTime += getRandomTime();
    }


    document.getElementById("time").innerHTML = hospitalTime + " min";
    document.getElementById("yourEstimate").innerHTML = userTime + " min";
}

// ================= DISPLAY =================
function updateDisplay() {

    document.getElementById("yourNum").innerHTML = yourNumber;
    document.getElementById("current").innerHTML = current;
    document.getElementById("latest").innerHTML = latest;

    // ROOM LOGIC
    if(appointmentType === "Online") {
        document.getElementById("room").innerHTML = "-";
    } else {
        document.getElementById("room").innerHTML = "101";
    }

    document.getElementById("type").innerHTML = appointmentType;
}

// ================= AUTO =================
function autoUpdate() {
    if(current < latest) {
        current++;
    }

    updateDisplay();
    calculateEstimate();
}

// INIT
updateDisplay();
calculateEstimate();

setInterval(autoUpdate, 5000);

</script>

</body>
</html>

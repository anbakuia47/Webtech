<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Queue System</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #eee;
    transition: 0.3s;
}

/* FONT */
body.small { font-size: 12px; }
body.medium { font-size: 16px; }
body.large { font-size: 20px; }

/* NAVBAR */
.navbar {
    background: #2f7f8a;
    padding: 15px 30px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.logo {
    width: 40px;
    height: 40px;
    background: black;
    border-radius: 50%;
}

/* MENU */
.menu {
    display: flex;
    gap: 40px;
}

.menu a {
    color: white;
    text-decoration: none;
    transition: 0.2s;
}

.menu a:hover {
    color: #ffd700;
    border-bottom: 2px solid #ffd700;
}

/* RIGHT */
.right span {
    margin: 0 5px;
    cursor: pointer;
    color: white;
    transition: 0.2s;
}

.right span:hover {
    color: #ffd700;
}

/* CONTENT */
.content {
    padding: 30px;
}

/* BOX LAYOUT (cantik & balance) */
.flex {
    display: flex;
    gap: 50px;
    justify-content: center;
    flex-wrap: wrap;
}

.box {
    background: #3e8c9c;
    color: white;
    padding: 25px;
    border-radius: 10px;
    flex: 1;
    min-width: 220px;
    max-width: 300px;
    text-align: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    transition: 0.2s;
}
</style>
</head>

<body class="medium">

<!-- NAVBAR -->
<div class="navbar">

    <div class="logo"></div>

    <div class="menu">
        <a href="homepage.html">About Us</a>
        <a href="location.html">Location</a>
        <a href="app.html">Appointment</a>
        <a href="queue.html">Queue</a>
        <a href="askDoctor.html">Ask Us</a>
    </div>

    <div class="right">
        <span onclick="setFont('small')">A-</span>
        <span onclick="setFont('medium')">A</span>
        <span onclick="setFont('large')">A+</span>
        |
        <span onclick="setLang('en')">EN</span>
        <span onclick="setLang('bm')">BM</span>
    </div>

</div>

<div class="content">

<h2 id="title">APPOINTMENT QUEUE</h2>

<div class="flex">

    <!-- USER INFO -->
    <div class="box">
        <h3 id="yourText">Your Appointment</h3>
        <p>Your Queue: <span id="yourNum"></span></p>
        <p>Room: <span id="room">101</span></p>
        <p>Doctor: <span id="doctor">Dr Ali</span></p>
        <p>Your Estimate: <span id="yourEstimate"></span></p>
        <p>Type: <span id="type"></span></p>
    </div>

    <!-- CURRENT -->
    <div class="box">
        <h3 id="currentText">Current Number</h3>
        <p id="current"></p>
    </div>

    <!-- LATEST -->
    <div class="box">
        <h3 id="latestText">Latest Queue</h3>
        <p id="latest"></p>
    </div>

</div>

<br>
<h3 id="estimateLabel">Hospital Queue Estimate: <span id="time"></span></h3>

</div>

<script>

// ================= DATA =================
let yourNumber = 18;
let current = 12;
let latest = 25;
let appointmentType = "Online"; // Online / Walk-in

// ================= FONT =================
function setFont(size) {
    document.body.className = size;
}

// ================= LANGUAGE =================
const text = {
    en: {
        title: "APPOINTMENT QUEUE",
        your: "Your Appointment",
        current: "Current Number",
        latest: "Latest Queue",
        estimate: "Hospital Queue Estimate:"
    },
    bm: {
        title: "GILIRAN TEMU JANJI",
        your: "Temu Janji Anda",
        current: "Nombor Semasa",
        latest: "Giliran Terkini",
        estimate: "Anggaran Masa Hospital:"
    }
};

function setLang(lang) {
    document.getElementById("title").innerHTML = text[lang].title;
    document.getElementById("yourText").innerHTML = text[lang].your;
    document.getElementById("currentText").innerHTML = text[lang].current;
    document.getElementById("latestText").innerHTML = text[lang].latest;
    document.getElementById("estimateLabel").innerHTML =
        text[lang].estimate + " <span id='time'></span>";
    calculateEstimate();
}

// ================= RANDOM TIME =================
function getRandomTime() {
    return Math.floor(Math.random() * 11) + 10; // 10–20 min
}

// ================= CALCULATE =================
function calculateEstimate() {

    // Hospital estimate
    let hospitalWaiting = latest - current;
    let hospitalTime = 0;

    for(let i = 0; i < hospitalWaiting; i++) {
        hospitalTime += getRandomTime();
    }

    // User estimate
    let userWaiting = yourNumber - current;
    let userTime = 0;

    for(let i = 0; i < userWaiting; i++) {
        userTime += getRandomTime();
    }

    // display
    document.getElementById("time").innerHTML = hospitalTime + " min";
    document.getElementById("yourEstimate").innerHTML = userTime + " min";
}

// ================= DISPLAY =================
function updateDisplay() {
    document.getElementById("yourNum").innerHTML = yourNumber;
    document.getElementById("current").innerHTML = current;
    document.getElementById("latest").innerHTML = latest;
    document.getElementById("type").innerHTML = appointmentType;
}

// ================= AUTO UPDATE =================
function autoUpdate() {
    if(current < latest) {
        current++;
    }

    updateDisplay();
    calculateEstimate();
}

// ================= INIT =================
updateDisplay();
calculateEstimate();

setInterval(autoUpdate, 5000);

</script>

</body>
</html>

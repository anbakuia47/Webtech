<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ask Doctor</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #eee;
    transition: 0.3s;
}

/* FONT */
body.small { font-size: 12px; }
body.medium { font-size: 16px; }
body.large { font-size: 20px; }

/* NAVBAR */
.navbar {
    background: #2f7f8a;
    padding: 15px 30px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.logo {
    width: 40px;
    height: 40px;
    background: black;
    border-radius: 50%;
}

/* MENU */
.menu {
    display: flex;
    gap: 40px;
}

.menu a {
    color: white;
    text-decoration: none;
    transition: 0.2s;
}

.menu a:hover {
    color: #ffd700;
    border-bottom: 2px solid #ffd700;
}

/* RIGHT */
.right span {
    margin: 0 5px;
    cursor: pointer;
    color: white;
}

.right span:hover {
    color: #ffd700;
}

/* CONTENT */
.content {
    padding: 30px;
}

/* INPUT */
input {
    padding: 10px;
    width: 300px;
}

button {
    padding: 10px 20px;
    background: #3e8c9c;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

/* CATEGORY */
.category button {
    background: black;
    margin: 5px;
}

.category button:hover {
    background: #555;
}

/* FAQ BOX */
.faq {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-top: 20px;
    max-width: 500px;
}

/* PLACEHOLDER */
#placeholderText {
    color: gray;
    font-style: italic;
}
</style>

</head>

<body class="medium">

<!-- NAVBAR -->
<div class="navbar">

    <div class="logo"></div>

    <div class="menu">
        <a href="homepage.html">About Us</a>
        <a href="location.html">Location</a>
        <a href="app.html">Appointment</a>
        <a href="queue.html">Queue</a>
        <a href="askDoctor.html">Ask Us</a>
    </div>

    <div class="right">
        <span onclick="setFont('small')">A-</span>
        <span onclick="setFont('medium')">A</span>
        <span onclick="setFont('large')">A+</span>
        |
        <span>EN</span>
        <span>BM</span>
    </div>

</div>

<div class="content">

<h2>Ask us anything</h2>

<input type="text" id="question" placeholder="Type your question...">
<button onclick="submitQuestion()">Ask a Doctor</button>

<h3>Categories (Check before asking):</h3>

<div class="category">
    <button onclick="showFAQ('Gastric')">Gastric</button>
    <button onclick="showFAQ('Diabetes')">Diabetes</button>
    <button onclick="showFAQ('Heart')">Heart Attack</button>
    <button onclick="showFAQ('Allergy')">Allergy</button>
    <button onclick="showFAQ('Pregnancy')">Pregnancy</button>
</div>

<!-- DISPLAY AREA -->
<div id="faqBox" class="faq">
    <p id="placeholderText">Your question will appear here...</p>
</div>

</div>

<script>

// FONT FUNCTION
function setFont(size) {
    document.body.className = size;
}

// FAQ DATA
const faqData = {
    Gastric: [
        {q: "Why stomach pain?", a: "Irregular eating habit."},
        {q: "Can I drink coffee?", a: "Avoid if gastric."}
    ],
    Diabetes: [
        {q: "What food avoid?", a: "Avoid sugar."}
    ],
    Heart: [
        {q: "How prevent?", a: "Exercise regularly."}
    ],
    Allergy: [
        {q: "Why rash?", a: "Allergic reaction."}
    ],
    Pregnancy: [
        {q: "What food good?", a: "Nutritious food."}
    ]
};

// SHOW FAQ
function showFAQ(cat) {
    let data = faqData[cat];
    let output = "<h4>" + cat + "</h4>";

    for(let i = 0; i < data.length; i++) {
        output += "<p><b>Q:</b> " + data[i].q + "</p>";
        output += "<p><b>A:</b> " + data[i].a + "</p><hr>";
    }

    document.getElementById("faqBox").innerHTML = output;
}

// SUBMIT QUESTION
function submitQuestion() {
    let q = document.getElementById("question").value;

    if(q === "") {
        alert("Enter your question!");
        return;
    }

    let chatBox = document.getElementById("faqBox");

    // buang placeholder first time
    document.getElementById("placeholderText")?.remove();

    // user message
    let userMsg = document.createElement("p");
    userMsg.innerHTML = "<b>You:</b> " + q;

    // doctor message (typing effect)
    let docMsg = document.createElement("p");
    docMsg.innerHTML = "<b>Doctor:</b> Typing...";

    chatBox.appendChild(userMsg);
    chatBox.appendChild(docMsg);

    // simulate reply delay
    setTimeout(() => {
        docMsg.innerHTML = "<b>Doctor:</b> Doctor will reply very soon.";
    }, 1500);

    document.getElementById("question").value = "";
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ask Doctor</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #eee;
    transition: 0.3s;
}

/* FONT */
body.small { font-size: 12px; }
body.medium { font-size: 16px; }
body.large { font-size: 20px; }

/* NAVBAR */
.navbar {
    background: #2f7f8a;
    padding: 15px 30px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.logo {
    width: 40px;
    height: 40px;
    background: black;
    border-radius: 50%;
}

/* MENU */
.menu {
    display: flex;
    gap: 40px;
}

.menu a {
    color: white;
    text-decoration: none;
}

.menu a:hover {
    color: #ffd700;
    border-bottom: 2px solid #ffd700;
}

/* RIGHT */
.right span {
    margin: 0 5px;
    cursor: pointer;
    color: white;
}

.right span:hover {
    color: #ffd700;
}

/* CONTENT */
.content {
    padding: 30px;
}

input {
    padding: 10px;
    width: 300px;
}

button {
    padding: 10px 20px;
    background: #3e8c9c;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.category button {
    background: black;
    margin: 5px;
}

.category button:hover {
    background: #555;
}

.faq {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-top: 20px;
    max-width: 500px;
}

#placeholderText {
    color: gray;
    font-style: italic;
}
</style>
</head>

<body class="medium">

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo"></div>

    <div class="menu">
        <a href="homepage.html" id="navAbout">About Us</a>
        <a href="location.html" id="navLocation">Location</a>
        <a href="app.html" id="navApp">Appointment</a>
        <a href="queue.html" id="navQueue">Queue</a>
        <a href="askDoctor.html" id="navAsk">Ask Us</a>
    </div>

    <div class="right">
        <span onclick="setFont('small')">A-</span>
        <span onclick="setFont('medium')">A</span>
        <span onclick="setFont('large')">A+</span>
        |
        <span onclick="setLang('en')">EN</span>
        <span onclick="setLang('bm')">BM</span>
    </div>
</div>

<div class="content">

<h2 id="title">Ask us anything</h2>

<input type="text" id="question">
<button onclick="submitQuestion()" id="askBtn">Ask a Doctor</button>

<h3 id="categoryTitle">Categories (Check before asking):</h3>

<div class="category">
    <button onclick="showFAQ('Gastric')" id="cat1">Gastric</button>
    <button onclick="showFAQ('Diabetes')" id="cat2">Diabetes</button>
    <button onclick="showFAQ('Heart')" id="cat3">Heart Attack</button>
    <button onclick="showFAQ('Allergy')" id="cat4">Allergy</button>
    <button onclick="showFAQ('Pregnancy')" id="cat5">Pregnancy</button>
</div>

<div id="faqBox" class="faq">
    <p id="placeholderText">Your question will appear here...</p>
</div>

</div>

<script>

// FONT
function setFont(size) {
    document.body.className = size;
}

// ================= LANGUAGE =================
let currentLang = "en";

const text = {
    en: {
        title: "Ask us anything",
        askBtn: "Ask a Doctor",
        placeholder: "Type your question...",
        category: "Categories (Check before asking):",
        empty: "Enter your question!",
        typing: "Doctor: Typing...",
        reply: "Doctor: Doctor will reply very soon.",
        you: "You",

        navAbout: "About Us",
        navLocation: "Location",
        navApp: "Appointment",
        navQueue: "Queue",
        navAsk: "Ask Us"
    },
    bm: {
        title: "Tanya apa sahaja",
        askBtn: "Tanya Doktor",
        placeholder: "Taip soalan anda...",
        category: "Kategori (Semak dahulu):",
        empty: "Sila masukkan soalan!",
        typing: "Doktor sedang menaip...",
        reply: "Doktor akan membalas tidak lama lagi.",
        you: "Anda",

        navAbout: "Tentang Kami",
        navLocation: "Lokasi",
        navApp: "Temu Janji",
        navQueue: "Giliran",
        navAsk: "Tanya Kami"
    }
};

// ================= FAQ DATA =================
const faqData = {
    en: {
        Gastric: [
            {q: "Why stomach pain?", a: "Irregular eating habit."}
        ],
        Diabetes: [
            {q: "What food avoid?", a: "Avoid sugar."}
        ],
        Heart: [
            {q: "How prevent?", a: "Exercise regularly."}
        ],
        Allergy: [
            {q: "Why rash?", a: "Allergic reaction."}
        ],
        Pregnancy: [
            {q: "What food good?", a: "Nutritious food."}
        ]
    },
    bm: {
        Gastric: [
            {q: "Kenapa sakit perut?", a: "Makan tidak teratur."}
        ],
        Diabetes: [
            {q: "Makanan apa perlu elak?", a: "Elakkan makanan manis."}
        ],
        Heart: [
            {q: "Cara cegah?", a: "Bersenam dan makan sihat."}
        ],
        Allergy: [
            {q: "Kenapa naik ruam?", a: "Reaksi alahan."}
        ],
        Pregnancy: [
            {q: "Makanan yang baik?", a: "Makanan berkhasiat."}
        ]
    }
};

// ================= SET LANGUAGE =================
function setLang(lang) {
    currentLang = lang;

    document.getElementById("title").innerHTML = text[lang].title;
    document.getElementById("askBtn").innerHTML = text[lang].askBtn;
    document.getElementById("question").placeholder = text[lang].placeholder;
    document.getElementById("categoryTitle").innerHTML = text[lang].category;

    document.getElementById("navAbout").innerHTML = text[lang].navAbout;
    document.getElementById("navLocation").innerHTML = text[lang].navLocation;
    document.getElementById("navApp").innerHTML = text[lang].navApp;
    document.getElementById("navQueue").innerHTML = text[lang].navQueue;
    document.getElementById("navAsk").innerHTML = text[lang].navAsk;

    // reset placeholder
    document.getElementById("faqBox").innerHTML =
        "<p id='placeholderText'>" + text[lang].placeholder + "</p>";
}

// ================= SHOW FAQ =================
function showFAQ(cat) {
    let data = faqData[currentLang][cat];
    let output = "<h4>" + cat + "</h4>";

    for(let i = 0; i < data.length; i++) {
        output += "<p><b>Q:</b> " + data[i].q + "</p>";
        output += "<p><b>A:</b> " + data[i].a + "</p><hr>";
    }

    document.getElementById("faqBox").innerHTML = output;
}

// ================= SUBMIT =================
function submitQuestion() {
    let q = document.getElementById("question").value;

    if(q === "") {
        alert(text[currentLang].empty);
        return;
    }

    let box = document.getElementById("faqBox");

    let userMsg = "<p><b>" + text[currentLang].you + ":</b> " + q + "</p>";
    let docMsg = "<p><b>" + text[currentLang].typing + "</b></p>";

    box.innerHTML = userMsg + docMsg;

    setTimeout(() => {
        box.innerHTML = userMsg +
        "<p><b>" + text[currentLang].reply + "</b></p>";
    }, 1500);

    document.getElementById("question").value = "";
}

</script>

</body>
</html>

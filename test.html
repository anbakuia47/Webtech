<!DOCTYPE html>
<html>
<body>

<h1>Doctor Selection</h1>

<div id="container"></div>

<script>
let doctors = [
  {name:"Dr A", speciality:"Surgeon", image:"https://via.placeholder.com/200"},
  {name:"Dr B", speciality:"Cardio", image:"https://via.placeholder.com/200"}
];

for (let i = 0; i < doctors.length; i++) {
  document.getElementById("container").innerHTML += `
    <div>
      <img src="${doctors[i].image}">
      <h3>${doctors[i].name}</h3>
      <p>${doctors[i].speciality}</p>
    </div>
  `;
}
</script>

</body>
</html>

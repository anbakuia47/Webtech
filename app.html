<div id="content" class="resizable medium-text">
        <h1>Doctor Selection</h1>
        <select id="filter" onchange="filterDoctors()">
        <option class="option" value="all">All</option>
        <option class="option" value="Surgeon">Surgeon</option>
        <option class="option" value="Cardiologist">Cardiologist</option>
        <option class="option" value="Pediatrician">Pediatrician</option>
        <option class="option" value="Dermatologist">Dermatologist</option>
        <option class="option" value="Neurologist">Neurologist</option>
</select>
        <div id="container"></div>
            <script>
                <!-- Doctor data -->
                let doctors = [
                    {name: "Dr. Wazid",
                     speciality: "Surgeon",
                     image: "doc_image/doc1.jpeg"},

                    {name: "Dr. Smith",
                     speciality: "Cardiologist",
                     image: "doc_image/doc2.jpeg"},

                    {name: "Dr. Lee",
                    speciality: "Pediatrician",
                    image:"doc_image/doc3.jpeg"},

                    {name:"Dr. Laura",
                    speciality: "Dermatologist",
                    image:"doc_image/doc4.jpeg"},

                    {name:"Dr. Nina",
                    speciality: "Neurologist",
                    image:"doc_image/doc5.jpeg"},
                ];
                // Loop for doctor's data
                for (let i=0;i<doctors.length;i++) 
                {
                    document.getElementById("container").innerHTML += `
                        <div class="container">
                            <img class="doc_img" src="${doctors[i].image}" alt="${doctors[i].name}" width="200" height="200"><br>
                            <h3 class="imgcapt">${doctors[i].name}</h3>
                            <p>${doctors[i].speciality}</p>
                        </div>
                    `;
                 }
                 //Filter for doctor's speciality
                function filterDoctors() 
                {
                    let selected = document.getElementById("filter").value;

                    if (selected === "all") 
                    {
                        displayDoctors(doctors);
                    } 

                    else 
                    {
                        let filtered = doctors.filter(doc => doc.speciality === selected);
                        displayDoctors(filtered);
                    }
                }
                function displayDoctors(list) 
                {
                    let container = document.getElementById("container");
                    container.innerHTML = "";

                    for (let i = 0; i < list.length; i++) 
                    {
                        container.innerHTML += `
                        <div class="container">
                            <img class="doc_img" src="${list[i].image}" width="200" height="200"><br>
                            <h3 class="imgcapt">${list[i].name}</h3>
                            <p>${list[i].speciality}</p>
                        </div>`;
                    }
            }
        
            </script>

        <script>
            //Calendar functionality
            let currentDate= new Date();
            function renderCalendar()
            {
                const dates=document.getElementById("dates");
                const monthYear=document.getElementById("monthYear");
                dates.innerHTML="";
                let year=currentDate.getFullYear();
                let month=currentDate.getMonth();
                let firstDay=new Date(year,month,1).getDay();
                let totalDays=new Date(year,month+1,0).getDate();
                monthYear.innerText=`${currentDate.toLocaleString("default",
                {month:"long",year:"numeric"})}`;

                //empty spaces before start
                for(let i=0;i<firstDay;i++)
                {dates.innerHTML+=`<div></div>`;}

                //actual dates
                for (let i=1;i<=totalDays;i++)
                {
                    dates.innerHTML+=`<div onclick="selectDate(${i})">${i}</div>`;
                }
            }
                function prevMonth()
                {
                    currentDate.setMonth(currentDate.getMonth()-1);
                    renderCalendar();
                }

                function nextMonth()
                {
                    currentDate.setMonth(currentDate.getMonth()+1);
                    renderCalendar();
                }

                function selectDate(day)
                {
                    alert("Selected date: " + day + " " + currentDate.toLocaleString("default",{month:"long",year:"numeric"}));
                }
                
                renderCalendar();

        </script>
        <script>
function setFont(size){

    let elements = document.getElementsByClassName("resizable");

    for(let i = 0; i < elements.length; i++){

        elements[i].classList.remove("small-text");
        elements[i].classList.remove("medium-text");
        elements[i].classList.remove("large-text");

        if(size == "small"){
            elements[i].classList.add("small-text");
        }

        else if(size == "medium"){
            elements[i].classList.add("medium-text");
        }

        else{
            elements[i].classList.add("large-text");
        }
    }
}
</script>

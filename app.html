<div id="content" class="resizable medium-text">

    <form id="appointmentForm">

        <label id="fullNameLabel">Full Name</label><br>
        <input type="text" name="fname" required><br>
        <label id="icLabel">IC Number</label><br>
        <input type="text" name="icno" required><br>
        <label id="genderLabel">Gender</label><br>

            </label>
            <label>

            </label>
        </div>
        <label id="dobLabel">Date of Birth</label><br>
        <input type="date" name="dob" required><br>
        <label id="telLabel">Telephone No</label><br>
        <input type="text" name="telno" required><br>
        <label id="emailLabel">Email</label><br>
        <input type="email" name="email" required><br>
        <label id="doctorLabel">Doctor's Name</label><br>
        <input type="text" id="docname" name="docname" readonly><br>
        <label id="dateLabel">Appointment Date</label><br>
        <input type="date" id="appointmentDate" name="app_date" readonly><br>
        <label id="timeLabel">Time of Appointment</label><br>
        <input type="time" name="app_time" required><br>
        <label id="appointmentLabel">Appointment</label><br>
        <div class="radio-group">
            <label>
                <input type="radio" name="app" value="Online Session" required>

            </label>
            <label>

// Filter doctor
function filterDoctors()
{
    let selected = document.getElementById("filter").value;
    if(selected === "all")
    {
        displayDoctors(doctors);
    }

    else
    {
        let filtered = doctors.filter(doc => doc.speciality === selected);
        displayDoctors(filtered);
    }
}

// Display doctors
function displayDoctors(list)
{
    let container = document.getElementById("doctorList");
    container.innerHTML = "";
    for(let i = 0; i < list.length; i++)
    {
        container.innerHTML += `
        <div class="container" onclick="selectDoctor('${list[i].name}',this)">

            <img class="doc_img" src="${list[i].image}" width="200" height="200">

            <h3 class="imgcapt">${list[i].name}</h3>

            <p>${list[i].speciality}</p>

            <p>${list[i].caption}</p>

        </div>`;
    }
}
let selectedDoctor = null;

// Select doctor
function selectDoctor(name, element)
{
    let all = document.querySelectorAll(".container");
    all.forEach(d => d.classList.remove("selectedDoctor"));
    element.classList.add("selectedDoctor");
    document.getElementById("docname").value = name;
    selectedDoctor = doctors.find(d => d.name === name);
}

// FORM SUBMIT
document.getElementById("appointmentForm").addEventListener("submit", function(e)
{
    e.preventDefault();
    let time = document.querySelector("input[name='app_time']").value;
    if(!selectedDoctor)
    {
        alert(text[currentLang].selectDoctor);
        return;
    }

    let start = selectedDoctor.availability.start;
    let end = selectedDoctor.availability.end;

    if(start < end)
    {
        if(time < start || time > end)
        {
            alert(`${text[currentLang].available} ${start} - ${end}`);
            return;
        }
    }

    else
    {
        if(!(time >= start || time <= end))
        {
            alert(`${text[currentLang].available} ${start} - ${end}`);
            return;
        }
    }
    document.getElementById("successMsg").innerText =
    text[currentLang].submitted;
});

// CALENDAR
let currentDate = new Date();

function renderCalendar()
{
    const dates = document.getElementById("dates");
    const monthYear = document.getElementById("monthYear");
    dates.innerHTML = "";
    let year = currentDate.getFullYear();
    let month = currentDate.getMonth();
    let firstDay = new Date(year, month, 1).getDay();
    let totalDays = new Date(year, month + 1, 0).getDate();
    monthYear.innerText =
    `${currentDate.toLocaleString("default",
    {month:"long", year:"numeric"})}`;

    for(let i = 0; i < firstDay; i++)
    {
        dates.innerHTML += `<div class="empty"></div>`;
    }

    let today = new Date();
    today.setHours(0,0,0,0);

    for(let i = 1; i <= totalDays; i++)
    {
        let checkDate = new Date(year, month, i);
        if(checkDate < today)
        {
            dates.innerHTML += `<div class="empty">${i}</div>`;
        }

        else
        {
            dates.innerHTML +=
            `<div onclick="selectDate(${i}, this)">${i}</div>`;
        }
    }
}
function prevMonth() 
{ 
    currentDate.setMonth(currentDate.getMonth() - 1); 
    renderCalendar(); 
}
function nextMonth() 
{
    currentDate.setMonth(currentDate.getMonth() + 1); 
    renderCalendar();
}

function selectDate(day, element)
{
    let allDates = document.querySelectorAll("#dates div");
    allDates.forEach(d => d.classList.remove("selected"));
    let month = currentDate.getMonth();
    let year = currentDate.getFullYear();
    element.classList.add("selected");
    let formattedDate =
    year + "-" +
    String(month + 1).padStart(2, '0') + "-" +
    String(day).padStart(2, '0');
    document.getElementById("appointmentDate").value = formattedDate;
}

renderCalendar();

// FONT SIZE
function setFont(size)
{
    let elements = document.getElementsByClassName("resizable");
    for(let i = 0; i < elements.length; i++)
    {
        elements[i].classList.remove("small-text");
        elements[i].classList.remove("medium-text");
        elements[i].classList.remove("large-text");

        if(size == "small")
        {
            elements[i].classList.add("small-text");
        }

        else if(size == "medium")
        {
            elements[i].classList.add("medium-text");
        }

        else
        {
            elements[i].classList.add("large-text");
        }
    }
}

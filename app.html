<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Appointment</title>
        <link rel="stylesheet" href="app.css">
    </head>
    <body>
        <!-- Navigation Bar -->
        <div class="navbar">
            <div class="logo"></div>
                <a href="homepage.html">About Us</a>
                <a href="location.html">Location</a>
                <a href="app.html">Appointment</a>
                <a href="queue.html">Queue</a>
                <a href="askDoctor.html">Ask Us</a>
                <div class="lang">A | EN | BM</div>
        </div>
        <!--Doctor's Filter-->
        <h1>Appointment</h1>
        <h3>Choose a Doctor:</h3>
        <select id="filter" onchange="filterDoctors()">
        <option value="all">All</option>
        <option value="Surgeon">Surgeon</option>
        <option value="Cardiologist">Cardiologist</option>
        <option value="Pediatrician">Pediatrician</option>
        <option value="Dermatologist">Dermatologist</option>
        <option value="Neurologist">Neurologist</option>
        <option value="Dentist">Dentist</option>
        </select>
        <div id="doctorList"></div>
            <script>
                //Doctor's data
                let doctors = [
                    {name: "Dr. Luke",
                     speciality: "Surgeon",
                     image: "doc_image/doc1.jpeg",
                     caption:"Available from 8:30am to 1:30pm",
                    availability: { start: "08:30", end: "13:30" }},

                    {name: "Dr. Smith",
                     speciality: "Cardiologist",
                     image: "doc_image/doc2.jpeg",
                     caption:"Available from 11:00am to 4:00pm",
                    availability: { start: "11:00", end: "16:00" }},

                    {name: "Dr. Lee",
                     speciality: "Pediatrician",
                     image:"doc_image/doc3.jpeg",
                     caption:"Available from 1:00pm to 6:00pm",
                    availability: { start: "13:00", end: "18:00" }},

                    {name:"Dr. Laura",
                     speciality: "Dermatologist",
                     image:"doc_image/doc4.jpeg",
                     caption:"Available from 3:00pm to 8:00pm",
                    availability: { start: "15:00", end: "20:00" }},

                    {name:"Dr. Nina",
                    speciality: "Neurologist",
                    image:"doc_image/doc5.jpeg",
                    caption:"Available from 6:00pm to 12:00am",
                    availability: { start: "18:00", end: "00:00" }},

                    {name:"Dr. Omar",
                     speciality: "Surgeon",
                     image:"doc_image/doc6.jpeg",
                     caption:"Available from 10:00pm to 3:00am",
                     availability: { start: "22:00", end: "03:00" }},

                    {name:"Dr. Anna",
                     speciality: "Cardiologist",
                     image:"doc_image/doc7.jpeg",
                     caption:"Available from 12:00am to 5:00am",
                     availability: { start: "00:00", end: "05:00" }},

                    {name:"Dr. Mel",
                    speciality:"Dentist",
                    image:"doc_image/doc8.jpeg",
                    caption:"Available from 4:00am to 9:00am",
                    availability: { start: "04:00", end: "09:00" }}
                    
                ];
                displayDoctors(doctors);
                //Filter for doctor's speciality
                function filterDoctors() 
                {
                    let selected = document.getElementById("filter").value;

                    if (selected === "all") 
                    {
                        displayDoctors(doctors);
                    } 

                    else 
                    {
                        let filtered = doctors.filter(doc => doc.speciality === selected);
                        displayDoctors(filtered);
                    }
                }
                function displayDoctors(list) 
                {
                    let container = document.getElementById("doctorList");
                    container.innerHTML = "";

                    for (let i = 0; i < list.length; i++) 
                    {
                        container.innerHTML += `
                        <div class="container" onclick="selectDoctor('${list[i].name}',this)">
                            <img class="doc_img" src="${list[i].image}" width="200" height="200"><br>
                            <h3 class="imgcapt">${list[i].name}</h3>
                            <p>${list[i].speciality}</p>
                            <p>${list[i].caption}</p>
                        </div>`;
                    }
                }
                let selectedDoctor = null;
                function selectDoctor(name,element)
                {
                     // remove highlight from all doctors
                    let all = document.querySelectorAll(".container");
                    all.forEach(d => d.classList.remove("selectedDoctor"));

                    // highlight the chosen doctor
                    element.classList.add("selectedDoctor");

                    //insert the doctor's name into the form
                    document.getElementById("docname").value = name;
                    selectedDoctor = doctors.find(d => d.name === name);
                }
            </script>
            <div class="bottom">
            <div class="calendar">
                <div class="header">
                <button onclick="prevMonth()">Previous Month</button>
                <h2 id="monthYear"></h2>
                <button onclick="nextMonth()">Next Month</button>
                </div>
            <div class="days">
                <div>Sun</div>
                <div>Mon</div>
                <div>Tue</div>
                <div>Wed</div>
                <div>Thu</div>
                <div>Fri</div>
                <div>Sat</div>
            </div>
            <div id="dates" class="dates"></div>
        </div>
        <!-- Appointment Form -->
        <form id="appointmentForm">
            <h2>Appointment Form</h2>
            <label>Full Name</label><br>
            <input type="text" name="fname" required><br>
            <label>IC Number</label><br>
            <input type="text" name="icno" required><br>
            <label>Gender</label><br>
            <div class="radio-group">
                <label><input type="radio" name="gender" value="male" required> Male</label>
                <label><input type="radio" name="gender" value="female"> Female</label>
            </div>  
            <label>Date of Birth</label><br>
            <input type="date" name="dob" required><br>
            <label>Telephone No</label><br>
            <input type="text" name="telno" required><br>
            <label>Email</label><br>
            <input type="email" name="email" required><br>
            <label>Doctor's Name</label><br>
            <input type="text" id="docname" name="docname" readonly><br>
            <label>Appointment Date</label><br>
            <input type="date" id="appointmentDate" name="app_date" readonly><br>
            <label>Time of Appointment</label><br>
            <input type="time" name="app_time" required><br>
            <label>Appointment</label><br>
            <div class="radio-group">
                <label><input type="radio" name="app" value="Online Session" required> Online Session</label>
                <label><input type="radio" name="app" value="Physical Session"> Physical Session</label>
            </div>
            <input type="submit" value="Submit">
            <p id="successMsg"></p>
        </form>
        </div>
        <script>
            document.getElementById("appointmentForm").addEventListener("submit", function(e) 
            {
                e.preventDefault(); 
                let time = document.querySelector("input[name='app_time']").value;
                if (!selectedDoctor)
                {
                    alert("Please select a doctor first!");
                    return;
                }
                let start = selectedDoctor.availability.start;
                let end = selectedDoctor.availability.end;

                if (start < end) 
                {
                    if (time < start || time > end)
                    {
                        alert(`Doctor only available between ${start} - ${end}`);
                        return;
                    }
                }
                else 
                {
                    if (!(time >= start || time <= end))
                    {
                        alert(`Doctor only available between ${start} - ${end}`);
                        return;
                    }
                }

                // Submitted form message
                document.getElementById("successMsg").innerText = "Your data has been submitted";
            });

            //Calendar functionality
            let currentDate= new Date();
            function renderCalendar()
            {
                
                const dates=document.getElementById("dates");
                const monthYear=document.getElementById("monthYear");
                dates.innerHTML="";
                let year=currentDate.getFullYear();
                let month=currentDate.getMonth();
                let firstDay=new Date(year,month,1).getDay();
                let totalDays=new Date(year,month+1,0).getDate();
                monthYear.innerText=`${currentDate.toLocaleString("default",
                {month:"long",year:"numeric"})}`;

                //empty spaces before start
                for(let i=0;i<firstDay;i++)
                {
                    dates.innerHTML+=`<div class="empty"></div>`;
                }

                //actual dates
                let today = new Date();
                today.setHours(0,0,0,0);
                for (let i=1;i<=totalDays;i++)
                {
 
                    let checkDate = new Date(year, month, i);
                    if (checkDate < today)  
                    {
                        dates.innerHTML += `<div class="empty">${i}</div>`;
                    }                    
                    else 
                    {
                        dates.innerHTML += `<div onclick="selectDate(${i}, this)">${i}</div>`;
                    }
                }
            }
                function prevMonth()
                {
                    currentDate.setMonth(currentDate.getMonth()-1);
                    renderCalendar();
                }

                function nextMonth()
                {
                    currentDate.setMonth(currentDate.getMonth()+1);
                    renderCalendar();
                }

                function selectDate(day, element)
                {
                    let allDates = document.querySelectorAll("#dates div");
                    allDates.forEach(d => d.classList.remove("selected"));
                    let month = currentDate.getMonth();
                    let year = currentDate.getFullYear();
                    element.classList.add("selected");
                    let formattedDate = year + "-" + 
                    String(month + 1).padStart(2, '0') + "-" + 
                    String(day).padStart(2, '0');
                    document.getElementById("appointmentDate").value = formattedDate;
                }

                renderCalendar();
        </script>
    </body>
</html>
